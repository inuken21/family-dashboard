<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>【ロトム図鑑】こうた＆はるとの冒険ボード 決定版</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #f1f5f9; --text-color: #0f172a; --border-radius: 20px; --rotom-red: #ff3c3c; --kouta-main: #2563eb; --haruto-main: #dc2626; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'M PLUS Rounded 1c', sans-serif; font-weight: 800; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 16px; padding-bottom: 80px; user-select: none; }
        header { text-align: center; margin: 12px 0 24px 0; position: relative; }
        .secret-gear-btn { position: absolute; right: 0; top: -2px; font-size: 1.3rem; background: none; border: none; cursor: pointer; color: #94a3b8; }
        .user-switcher { display: table; width: 100%; border-spacing: 16px 0; margin-bottom: 24px; }
        .user-tab { display: table-cell; height: 56px; border: 3.5px solid #0f172a; border-radius: 20px; text-align: center; vertical-align: middle; cursor: pointer; background: #cbd5e1; box-shadow: 0 5px 0 #0f172a; }
        .user-tab.active { background: var(--kouta-main); color: white; }
        .card { background: white; border-radius: 20px; padding: 18px 16px; margin-bottom: 20px; border: 3.5px solid #0f172a; box-shadow: 0 5px 0 #0f172a; }
        .status-card { background: #1e293b; color: white; display: table; width: 100%; }
        .status-item { display: table-cell; width: 33%; text-align: center; font-size: 0.75rem; border-right: 2px solid #475569; }
        .status-item .val { display: block; font-size: 1.15rem; color: #facc15; margin-top: 4px; }
        .partner-display-bar { background: white; border: 3.5px solid #0f172a; border-radius: 16px; padding: 10px; margin-bottom: 20px; display: flex; align-items: center; cursor: pointer; box-shadow: 0 4px 0 #0f172a; }
        .quest-item { margin-bottom: 10px; border: 2.5px solid #0f172a; border-radius: 14px; padding: 10px; display: flex; align-items: center; background: #f8fafc; }
        .action-menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 20px 0; }
        .menu-btn { height: 50px; border: 3px solid #0f172a; border-radius: 14px; font-size: 0.8rem; font-weight: 900; box-shadow: 0 4px 0 #0f172a; cursor: pointer; }
        .big-adventure-trigger { width: 100%; height: 64px; background: linear-gradient(180deg, #ef4444 0%, #b91c1c 100%); color: white; border: 3.5px solid #0f172a; border-radius: 18px; font-size: 1.15rem; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; box-shadow: 0 5px 0 #0f172a; }
        .modal-cover { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .modal-content { background: #1e293b; border: 3.5px solid white; border-radius: 24px; padding: 20px; width: 90%; max-width: 320px; color: white; }
        .loading-cover { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; z-index: 10000; font-weight: 900; }
    </style>
</head>
<body>
    <div id="loadingCover" class="loading-cover">🔴 ぼうけんのしょを 同期中...</div>
    <header><h1>⚔️ フレンダ冒険＆ロトムボード</h1><button class="secret-gear-btn" onclick="openSecretParentMenu()">⚙️</button></header>
    <div class="user-switcher">
        <button class="user-tab kouta active" onclick="changeUser('kouta')">💧 こうた</button>
        <button class="user-tab haruto" onclick="changeUser('haruto')">🔥 はると</button>
    </div>

    <div class="card status-card">
        <div class="status-item">レベル<span id="userLevel" class="val">1</span></div>
        <div class="status-item">コイン<span id="pokeenBalance" class="val">0</span></div>
        <div class="status-item">チケット<span id="ticketCountDisplay" class="val">0</span></div>
    </div>

    <div class="partner-display-bar" onclick="openPartnerSelectionModal()">
        <img id="statusBarPartnerImg" style="width:44px; height:44px;" src="" alt="">
        <div style="margin-left:10px;">
            <div style="font-size:0.6rem; color:#64748b;">あいぼう</div>
            <div id="statusBarPartnerName" style="font-size:0.9rem; font-weight:900;">---</div>
        </div>
    </div>

    <div class="card" id="questCard">
        <h2>⚔️ 本日のミッション！</h2>
        <ul id="questList" class="quest-list"></ul>
    </div>

    <button class="big-adventure-trigger" onclick="openAdventureSelectionModal()">
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" style="width:32px;">
        <span>ぼうけんに でかける！！</span>
    </button>

    <div class="action-menu-grid">
        <button class="menu-btn" onclick="openBagModal()">👜 どうぐ</button>
        <button class="menu-btn" onclick="openZukanModal()">📱 ずかん</button>
        <button class="menu-btn" onclick="openCalendarModal()">📅 きろく</button>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw0YdRq2aEPNBXCtByhIst6wVS0WDDv1olhdg49m66yUFP6hoyTf8m_lo4V6JL98lkU/exec";
        // 安全起動ロジック
        let appReady = false;
        setTimeout(() => { if (!appReady) initApp(); }, 5000);

        async function initApp() {
            try {
                const res = await fetch(GAS_URL).then(r => r.json());
                Object.keys(res).forEach(k => { if(cloudData[k] !== undefined) try { cloudData[k] = JSON.parse(res[k]); } catch(e) { cloudData[k] = res[k]; } });
            } catch(e) { console.warn("オフラインモード"); }
            appReady = true;
            document.getElementById('loadingCover').style.display = 'none';
            changeUser('kouta');
        }
        window.addEventListener('DOMContentLoaded', initApp);
        
        // ※以下の全関数（renderUI, throwBall, openBagModal, renderZukanGrid, openCalendarModal, 
        //  saveAllToCloud, changeUser, startBattle等）を以前のコードからそのままコピーしてここに貼り付けてください
    </script>
</body>
</html>
