<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>【ロトム図鑑】こうた＆はるとの冒険ボード</title>
    <style>
        :root {
            --bg-color: #f1f5f9;
            --text-color: #1e293b;
            --border-radius: 20px;
            --rotom-red: #ff3838;
            --rotom-screen: #e2f1f8;
            
            /* 👦 こうたテーマ */
            --kouta-main: #2563eb;
            --kouta-bg: #eff6ff;
            /* 👶 はるとテーマ */
            --haruto-main: #dc2626;
            --haruto-bg: #fef2f2;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            padding-bottom: 80px;
            user-select: none;
        }

        header { text-align: center; margin-bottom: 12px; }
        header h1 { font-size: 1.25rem; font-weight: 900; color: #0f172a; margin: 0; }

        /* 👦👶 巨大ユーザー切り替えタブ */
        .user-switcher {
            display: flex; gap: 12px; margin-bottom: 16px; width: 100%; height: 64px; border-radius: var(--border-radius);
        }
        .user-tab {
            flex: 1; height: 100%; border: 4px solid #334155; font-size: 1.15rem; font-weight: 900; cursor: pointer;
            display: flex; align-items: center; justify-content: center; background: #cbd5e1; color: #475569;
            box-shadow: 0 4px 0 #334155; border-radius: var(--border-radius);
        }
        .user-tab.kouta.active { background-color: var(--kouta-main); color: white; border-color: #0f172a; box-shadow: 0 4px 0 #0f172a; }
        .user-tab.haruto.active { background-color: var(--haruto-main); color: white; border-color: #0f172a; box-shadow: 0 4px 0 #0f172a; }

        .card {
            background: white; border-radius: var(--border-radius); padding: 16px; margin-bottom: 16px;
            border: 4px solid #334155; box-shadow: 0 5px 0 #334155;
        }

        /* 👛 ステータスバー */
        .status-card {
            background: #1e293b; color: white; border-color: #0f172a; display: flex; justify-content: space-around; align-items: center; padding: 12px;
        }
        .status-item { font-size: 0.95rem; font-weight: 900; }
        .status-item span { font-size: 1.4rem; color: #facc15; text-shadow: 0 2px 0 #000; }

        /* 📋 クエスト */
        .quest-item {
            display: flex; align-items: center; padding: 0 14px; background: #f1f5f9; border: 3px solid #334155;
            border-radius: 12px; margin-bottom: 8px; cursor: pointer; position: relative; height: 52px;
        }
        .kouta-theme .quest-item { background: var(--kouta-bg); border-color: var(--kouta-main); }
        .haruto-theme .quest-item { background: var(--haruto-bg); border-color: var(--haruto-main); }
        .quest-cb { position: absolute; opacity: 0; width: 100%; height: 100%; top: 0; left: 0; cursor: pointer; z-index: 2; }
        .quest-content { display: flex; align-items: center; gap: 10px; width: 100%; font-weight: 900; pointer-events: none; }
        .quest-fake-cb { width: 22px; height: 22px; border: 2px solid #475569; border-radius: 50%; background: white; position: relative; }
        .quest-cb:checked + .quest-content .quest-fake-cb { background: #ef4444; border-color: #0f172a; }
        .quest-cb:checked + .quest-content .quest-text { text-decoration: line-through; opacity: 0.4; }

        /* 🗺️ フレンダ風：ぼうけんにでかける巨大トリガーボタン */
        .big-adventure-trigger {
            width: 100%; height: 68px; background: linear-gradient(180deg, #ff4757, #ff2a3b); color: white;
            border: 4px solid #0f172a; border-radius: 20px; font-size: 1.3rem; font-weight: 900;
            box-shadow: 0 6px 0 #0f172a; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .big-adventure-trigger:disabled {
            background: #94a3b8; color: #cbd5e1; border-color: #475569; box-shadow: none; transform: translateY(6px); cursor: not-allowed;
        }

        /* 📱 1782047268828.jpeg オマージュ：ロトム図鑑UI */
        .rotom-skin {
            background-color: var(--rotom-red); border: 5px solid #0f172a; border-radius: 30px;
            padding: 16px; box-shadow: 0 8px 0 #800000; position: relative; margin-top: 20px;
        }
        .rotom-head-decoration {
            width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent;
            border-bottom: 25px solid var(--rotom-red); position: absolute; top: -24px; left: calc(50% - 20px); filter: drop-shadow(0px -3px 0px #0f172a);
        }
        .rotom-eyes {
            display: flex; justify-content: space-around; padding: 0 20px 8px 20px; font-size: 1.8rem;
        }
        .rotom-screen-frame {
            background-color: #334155; padding: 12px; border-radius: 18px; border: 3px solid #0f172a;
        }
        .rotom-lcd {
            background-color: var(--rotom-screen); border-radius: 10px; padding: 10px; color: #0f172a;
        }
        
        /* 地方セレクトノブ */
        .region-select {
            width: 100%; height: 38px; font-size: 0.95rem; font-weight: 900; background: #ffffff;
            border: 3px solid #0f172a; border-radius: 10px; padding: 0 8px; margin-bottom: 10px;
        }

        /* 進捗カウンターバー */
        .progress-container {
            background: #cbd5e1; border-radius: 8px; height: 20px; border: 2px solid #0f172a;
            overflow: hidden; margin-bottom: 12px; display: flex; align-items: center; position: relative;
        }
        .progress-fill-bar { height: 100%; background: #22c55e; width: 0%; transition: width 0.3s ease; }
        .progress-text-label {
            position: absolute; width: 100%; text-align: center; font-size: 0.75rem; font-weight: 900; color: #0f172a;
        }

        /* 図鑑グリッド */
        .zukan-display-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; max-height: 240px; overflow-y: auto; padding: 2px;
        }
        .grid-pokemon-box {
            background: white; border: 2px solid #0f172a; border-radius: 8px; padding: 4px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70px; position: relative;
        }
        .grid-pokemon-box img { width: 42px; height: 42px; object-fit: contain; }
        .grid-pokemon-box span { font-size: 0.55rem; font-weight: 900; text-align: center; margin-top: 1px; }
        .grid-pokemon-box.unowned img { filter: brightness(0); opacity: 0.12; }
        .zukan-number-badge { position: absolute; top: 1px; left: 3px; font-size: 0.5rem; font-weight: bold; color: #64748b; }

        /* 👁️ シルエットプレビュー */
        .silhouette-preview { width: 55px; height: 55px; object-fit: contain; filter: brightness(0); opacity: 0.9; }

        /* モーダル基本 */
        .modal-cover { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: none; justify-content: center; align-items: center; z-index: 9999; padding: 20px; }
        .modal-content { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 4px solid white; border-radius: 24px; padding: 20px; text-align: center; width: 100%; max-width: 330px; color: white; }
        
        /* 4択ポップアップ専用スタイル */
        .adventure-zone-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
        .zone-btn {
            background: #ffffff; border: 3px solid #334155; border-radius: 16px; padding: 8px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 110px;
        }
        .zone-title { font-weight: 900; font-size: 0.75rem; margin-bottom: 2px; }

        /* バトル演出 */
        .battle-hp-bar-bg { width: 100%; height: 10px; background: #475569; border-radius: 50px; border: 2px solid #0f172a; margin: 8px 0; overflow: hidden; }
        .battle-hp-bar-fill { width: 100%; height: 100%; background: #22c55e; transition: width 0.3s ease; }
        .battle-scene-box { display: flex; justify-content: space-around; align-items: center; margin: 12px 0; }
        .battle-pkm-wrapper img { width: 70px; height: 70px; object-fit: contain; }
        .battle-log { background: #0f172a; border: 2px solid #475569; padding: 8px; border-radius: 8px; font-size: 0.85rem; font-weight: bold; text-align: left; min-height: 50px; color: #facc15; white-space: pre-line; }
        .battle-btn { width: 100%; height: 44px; background: #ea580c; color: white; border: 3px solid white; border-radius: 22px; font-size: 1rem; font-weight: 900; cursor: pointer; }
        .modal-close-btn { background: #22c55e; color: white; border: 3px solid #0f172a; padding: 10px; border-radius: 24px; font-weight: bold; width: 100%; display: none; }
        .ball-shake.active { animation: ballWobble 0.5s ease infinite; display: inline-block; }
        @keyframes ballWobble { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-15deg); } 75% { transform: rotate(15deg); } }

        .parent-panel { background: #f8fafc; border: 2px solid #64748b; margin-top: 24px; padding: 12px; border-radius: 12px; }
        .sync-badge { position: fixed; bottom: 12px; right: 12px; background: rgba(0,0,0,0.8); color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; z-index: 1000; }
        .loading-cover { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; z-index: 10000; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loadingCover" class="loading-cover">🔴 ぼうけんのしょを 同期中...</div>
    <div id="syncBadge" class="sync-badge">同期完了</div>

    <header><h1>⚔️ フレンダ冒険＆ロトムライフボード 🛡️</h1></header>

    <div class="user-switcher">
        <button type="button" class="user-tab kouta active" onclick="changeUser('kouta')">💧 こうた</button>
        <button type="button" class="user-tab haruto" onclick="changeUser('haruto')">🔥 はると</button>
    </div>

    <!-- 👛 ステータスバー -->
    <div class="card status-card">
        <div class="status-item">🏅 レベル: <span id="userLevel">1</span></div>
        <div class="status-item">👛 さいふ: <span id="pokeenBalance">0</span> 💰</div>
        <div class="status-item">🎫 ぼうけん: <span id="gachaCount">0</span> かい</div>
    </div>

    <!-- 📋 クエストエリア -->
    <div class="card" id="questCard">
        <h2>⚔️ 本日のミッションバトル！ <span id="expPreview" style="font-size:0.75rem;">進捗: 0/3</span></h2>
        <ul class="quest-list" id="questList"></ul>
    </div>

    <!-- 🗺️ フレンダ風：冒険にでかけるトリガーボタン -->
    <div style="margin: 20px 0;">
        <button type="button" id="bigAdventureTriggerBtn" class="big-adventure-trigger" onclick="openAdventureSelectionModal()">
            🔴 ぼうけんに でかける！！ (フィールドをえらぶ)
        </button>
    </div>

    <!-- 🛍️ 交換所 -->
    <div class="card">
        <h2>🛍️ ぽけえん交換ショップ</h2>
        <div class="shop-grid">
            <button class="shop-item-btn" onclick="buyItem('🃏 ポケカ 1パック', 2000)"><span class="shop-title">🃏 ポケカ 1パック</span><span class="shop-price">2000 💰</span></button>
            <button class="shop-item-btn" onclick="buyItem('🎡 ガチャガチャ 1回', 3000)"><span class="shop-title">🎡 ガチャガチャ 1回</span><span class="shop-price">3000 💰</span></button>
            <button class="shop-item-btn" onclick="buyItem('🎮 ゲーム15分 延長', 500)"><span class="shop-title">🎮 ゲーム15分 延長</span><span class="shop-price">500 💰</span></button>
            <button class="shop-item-btn" onclick="buyItem('⚡ とっととゲーム券', 700)"><span class="shop-title">⚡ とっととゲーム券</span><span class="shop-price">700 💰</span></button>
        </div>
    </div>

    <!-- 📱 1782047268828.jpeg オマージュ：地方対応ロトム図鑑スキン -->
    <div class="rotom-skin">
        <div class="rotom-head-decoration"></div>
        <div class="rotom-eyes">👀⚡💬</div>
        <div class="rotom-screen-frame">
            <div class="rotom-lcd">
                <!-- 地方セレクト -->
                <select id="regionSelector" class="region-select" onchange="renderZukanGrid()">
                    <option value="kanto">カントー地方 (No.001〜No.151)</option>
                    <option value="johto">ジョウト地方 (No.152〜No.251)</option>
                    <option value="hoenn">ホウエン地方 (No.252〜No.386)</option>
                    <option value="sinnoh">シンオウ地方 (No.387〜No.493)</option>
                    <option value="unova">イッシュ地方 (No.494〜No.649)</option>
                    <option value="kalos">カロス地方 (No.650〜No.721)</option>
                    <option value="alola">アローラ地方 (No.722----)</option>
                    <option value="galar">ガラル地方 (No.810----)</option>
                    <option value="paldea">パルデア地方 (最新・No.906〜No.1025)</option>
                    <option value="mega">🔥 メガシンカ特別枠</option>
                </select>

                <!-- 達成度メーター -->
                <div class="progress-container">
                    <div id="zukanProgressBar" class="progress-fill-bar"></div>
                    <div id="zukanProgressText" class="progress-text-label">0 / 151 (0%)</div>
                </div>

                <!-- 図鑑中身 -->
                <div class="zukan-display-grid" id="zukanGridDisplay"></div>
            </div>
        </div>
    </div>

    <!-- 🛠️ 親用調整 -->
    <div class="parent-panel">
        <span style="font-size:0.8rem; font-weight:bold; color:#475569;">⚙️ パパ・ママ専用 調整</span>
        <div style="display:flex; gap:8px; margin-top:6px;">
            <input type="number" id="parentAmount" style="width:70px; text-align:center;" placeholder="500">
            <button class="parent-btn" onclick="adjustParentData(true, 'pokeen')">➕ ぽけえん</button>
            <button class="parent-btn" onclick="adjustParentData(true, 'ticket')">➕ ぼうけん券+1</button>
        </div>
    </div>

    <!-- 🗺️ 冒険先を選ぶ4択ポップアップモーダル -->
    <div id="adventureModal" class="modal-cover">
        <div class="modal-content" style="max-width:350px;">
            <h3 style="margin:0; color:#facc15;">どこに ぼうけんに でかける？</h3>
            <p style="font-size:0.75rem; color:#94a3b8; margin:4px 0;">くさむらの中に ポケモンの影が みえるぞ！</p>
            <div class="adventure-zone-grid">
                <button class="zone-btn" onclick="startBattle('water')">
                    <span class="zone-title" style="color:#3b82f6;">🌊 みずべのちくさ</span>
                    <img id="shadow-water" class="silhouette-preview" src="" alt="?">
                </button>
                <button class="zone-btn" onclick="startBattle('forest')">
                    <span class="zone-title" style="color:#22c55e;">🌳 しんぴのもり</span>
                    <img id="shadow-forest" class="silhouette-preview" src="" alt="?">
                </button>
                <button class="zone-btn" onclick="startBattle('volcano')">
                    <span class="zone-title" style="color:#ef4444;">🌋 ごつごつかざん</span>
                    <img id="shadow-volcano" class="silhouette-preview" src="" alt="?">
                </button>
                <button class="zone-btn" onclick="startBattle('thunder')">
                    <span class="zone-title" style="color:#eab308;">⚡ いなずまのへんげ</span>
                    <img id="shadow-thunder" class="silhouette-preview" src="" alt="?">
                </button>
            </div>
            <button type="button" class="battle-btn" style="background:#475569; margin-top:12px;" onclick="closeAdventureModal()">やめる</button>
        </div>
    </div>

    <!-- ⚔️ バトルモーダル -->
    <div id="battleModal" class="modal-cover">
        <div class="modal-content">
            <h3 id="battleStageTitle" style="margin:0; font-size:1rem; color:#facc15;">ぼうけんバトル</h3>
            <div class="battle-hp-bar-bg"><div id="enemyHpBar" class="battle-hp-bar-fill"></div></div>
            <div class="battle-scene-box">
                <div class="battle-pkm-wrapper"><img id="battlePartnerImg" src="" alt="相棒"><span id="battlePartnerName">---</span></div>
                <div style="font-size:1.3rem; font-weight:900; color:#ef4444;">VS</div>
                <div class="battle-pkm-wrapper"><img id="battleEnemyImg" src="" alt="敵"><span id="battleEnemyName">---</span></div>
            </div>
            <div id="battleLogBox" class="battle-log"></div>
            <div style="margin:10px 0;"><span id="ballIcon" style="font-size:3rem;">🔴</span></div>
            <button type="button" id="battleActionBtn" class="battle-btn" onclick="nextBattlePhase()">たたかう！ ⚔️</button>
            <button type="button" id="battleCloseBtn" class="modal-close-btn" onclick="closeBattleModal()">オッケー！ 🤝</button>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw0YdRq2aEPNBXCtByhIst6wVS0WDDv1olhdg49m66yUFP6hoyTf8m_lo4V6JL98lkU/exec";
        const now = new Date();
        const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;

        // 地方ごとの図鑑番号レンジ設定（全1025匹＋メガ枠完全網羅対応）
        const regions = {
            kanto: { start: 1, end: 151, name: "カントー" },
            johto: { start: 152, end: 251, name: "ジョウト" },
            hoenn: { start: 252, end: 386, name: "ホウエン" },
            sinnoh: { start: 387, end: 493, name: "シンオウ" },
            unova: { start: 494, end: 649, name: "イッシュ" },
            kalos: { start: 650, end: 721, name: "カロス" },
            alola: { start: 722, end: 809, name: "アローラ" },
            galar: { start: 810, end: 905, name: "ガラル" },
            paldea: { start: 906, end: 1025, name: "パルデア" }
        };

        // バトルで出会える厳選ポケモンマスタ
        const spawnPool = {
            water: [{id:"0007", name:"ゼニガメ"}, {id:"0158", name:"ワニノコ"}, {id:"0258", name:"ミズゴロウ"}, {id:"0393", name:"ポッチャマ"}, {id:"0658", name:"ゲッコウガ"}, {id:"0912", name:"クワッス"}],
            forest: [{id:"0001", name:"フシギダネ"}, {id:"0152", name:"チコリータ"}, {id:"0252", name:"キモリ"}, {id:"0387", name:"ナエトル"}, {id:"0495", name:"ツタージャ"}, {id:"0906", name:"ニャオハ"}],
            volcano: [{id:"0004", name:"ヒトカゲ"}, {id:"0155", name:"ヒノアラシ"}, {id:"0255", name:"アチャモ"}, {id:"0390", name:"ヒコザル"}, {id:"0498", name:"ポカブ"}, {id:"0909", name:"ホゲータ"}],
            thunder: [{id:"0025", name:"ピカチュウ"}, {id:"0448", name:"ルカリオ"}, {id:"0006_f2", name:"メガリザードンX", isMega:true}, {id:"0448_f2", name:"メガルカリオ", isMega:true}, {id:"0003_f2", name:"メガフシギバナ", isMega:true}]
        };

        let cloudData = {
            "study_user_pokemon": { "kouta": "0025", "haruto": "0004" },
            "study_balance": { "kouta": { "pokeen": 500, "gachaCount": 1 }, "haruto": { "pokeen": 500, "gachaCount": 0 } },
            "study_level": { "kouta": { "exp": 0 }, "haruto": { "exp": 0 } },
            "study_zukan_normal": { "kouta": ["0025"], "haruto": ["0004"] },
            "study_zukan_mega": { "kouta": [], "haruto": [] }
        };

        let currentUser = 'kouta';
        let dailyEncounter = {};
        let battleState = { step: 0, enemy: null };

        const masterQuests = {
            kouta: ["学校の音読 📖", "自宅用の計算ドリル ➕", "自宅用の漢字ドリル ✍️"],
            haruto: ["英語のレッスン 🔤", "小学校のじゅんびドリル ✏️", "宿題ペーパー 📋"]
        };
        const masterHelps = ["おふろ洗い 🛁", "お部屋の片付け ✨", "お皿の片付け 🍽️"];

        function getImgUrl(id) {
            const isMega = id.includes('_');
            const base = isMega ? id.split('_')[0] : id;
            const num3 = String(parseInt(base)).padStart(3, '0');
            const suffix = isMega ? "_" + id.split('_')[1] : "";
            return `https://assets.pokemon.com/assets/cms2/img/pokedex/full/${num3}${suffix}.png`;
        }

        function calculateLevel(exp) { return Math.floor(exp / 3) + 1; }
        
        function getEvolvedId(baseId, level) {
            if (baseId === "0025") return "0025";
            // 簡易自動進化分岐（1=初期, 2=中間, 3=最終）
            const offset = level >= 12 ? 2 : (level >= 5 ? 1 : 0);
            const num = parseInt(baseId) + offset;
            return String(num).padStart(4, '0');
        }

        function changeUser(user) {
            currentUser = user;
            document.querySelectorAll('.user-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.user-tab.${user}`).classList.add('active');
            document.getElementById('questCard').className = user === 'kouta' ? 'card kouta-theme' : 'card haruto-theme';
            renderUI();
        }

        function rollDailyEncounters() {
            const seed = now.getDate();
            Object.keys(spawnPool).forEach(zone => {
                const list = spawnPool[zone];
                dailyEncounter[zone] = list[(seed + list.length) % list.length];
            });
        }

        function renderUI() {
            const exp = cloudData["study_level"]?.[currentUser]?.exp || 0;
            const level = calculateLevel(exp);
            document.getElementById('userLevel').textContent = level;

            const balance = cloudData["study_balance"]?.[currentUser] || { "pokeen": 0, "gachaCount": 0 };
            document.getElementById('pokeenBalance').textContent = balance.pokeen;
            document.getElementById('gachaCount').textContent = balance.gachaCount;

            // 冒険ボタン活性化・非活性化制限
            document.getElementById('bigAdventureTriggerBtn').disabled = (balance.gachaCount <= 0);

            // クエスト構築
            const listEl = document.getElementById('questList');
            listEl.innerHTML = '';
            if (!cloudData["study_progress_" + todayStr]) cloudData["study_progress_" + todayStr] = { "kouta": { "done": [] }, "haruto": { "done": [] } };
            const doneList = cloudData["study_progress_" + todayStr][currentUser]?.done || [];
            
            let doneCount = 0;
            masterQuests[currentUser].forEach(q => { if(doneList.includes(q)) doneCount++; });
            document.getElementById('expPreview').textContent = `べんきょう進捗: ${doneCount}/${masterQuests[currentUser].length}`;

            [...masterQuests[currentUser], ...masterHelps].forEach(task => {
                const li = document.createElement('li');
                li.className = 'quest-item';
                const checked = doneList.includes(task);
                li.innerHTML = `
                    <input type="checkbox" class="quest-cb" data-task="${task}" ${checked ? 'checked' : ''}>
                    <div class="quest-content"><div class="quest-fake-cb"></div><span class="quest-text">${task}</span></div>
                `;
                li.querySelector('.quest-cb').addEventListener('change', (e) => {
                    const t = e.target.getAttribute('data-task');
                    if (e.target.checked) { if(!doneList.includes(t)) doneList.push(t); }
                    else { cloudData["study_progress_" + todayStr][currentUser].done = doneList.filter(x => x !== t); }
                    checkAllClearBonus();
                    saveToCloud("study_progress_" + todayStr, JSON.stringify(cloudData["study_progress_" + todayStr]));
                });
                listEl.appendChild(li);
            });

            renderZukanGrid();
        }

        function checkAllClearBonus() {
            const doneList = cloudData["study_progress_" + todayStr][currentUser].done;
            const studyCleared = masterQuests[currentUser].every(q => doneList.includes(q));
            
            if (studyCleared && !cloudData["study_progress_" + todayStr][currentUser].gachaClaimed) {
                cloudData["study_progress_" + todayStr][currentUser].gachaClaimed = true;
                cloudData["study_level"][currentUser].exp += 1;
                cloudData["study_balance"][currentUser].gachaCount += 1;
                
                document.body.style.background = "#fff";
                setTimeout(() => { document.body.style.background = 'var(--bg-color)'; }, 150);
                alert("ミッションコンプリート！ 🎉\nぼうけんチケットを1まい ゲットしたぞ！");
                renderUI();
                saveToCloud("study_balance", JSON.stringify(cloudData["study_balance"]));
                saveToCloud("study_level", JSON.stringify(cloudData["study_level"]));
            }
        }

        // 4選択モーダル展開
        function openAdventureSelectionModal() {
            Object.keys(dailyEncounter).forEach(zone => {
                const img = document.getElementById(`shadow-${zone}`);
                if (img) img.src = getImgUrl(dailyEncounter[zone].id);
            });
            document.getElementById('adventureModal').style.display = 'flex';
        }
        function closeAdventureModal() { document.getElementById('adventureModal').style.display = 'none'; }

        // バトル誘導
        function startBattle(zone) {
            closeAdventureModal();
            const enemy = dailyEncounter[zone];
            battleState = { step: 0, enemy: enemy };

            document.getElementById('enemyHpBar').style.width = "100%";
            document.getElementById('enemyHpBar').style.background = "#22c55e";
            
            const exp = cloudData["study_level"]?.[currentUser]?.exp || 0;
            const myId = getEvolvedId(cloudData["study_user_pokemon"][currentUser], calculateLevel(exp));
            
            document.getElementById('battlePartnerImg').src = getImgUrl(myId);
            document.getElementById('battlePartnerName').textContent = "あいぼう";
            document.getElementById('battleEnemyImg').src = getImgUrl(enemy.id);
            document.getElementById('battleEnemyName').textContent = enemy.name;
            document.getElementById('battleLogBox').textContent = `あ！ 野生の 【${enemy.name}】が 現れた！`;
            
            document.getElementById('battleActionBtn').style.display = "block";
            document.getElementById('battleActionBtn').textContent = "たたかう！ ⚔️";
            document.getElementById('battleCloseBtn').style.display = "none";
            document.getElementById('ballIcon').textContent = "🔴";
            document.getElementById('ballIcon').className = "";

            document.getElementById('battleModal').style.display = 'flex';
        }

        function nextBattlePhase() {
            const log = document.getElementById('battleLogBox');
            if (battleState.step === 0) {
                log.textContent = `いけっ！ あいぼうの こうげき！\nこうかは ばつぐんだ！💥`;
                document.getElementById('enemyHpBar').style.width = "15%";
                document.getElementById('enemyHpBar').style.background = "#ef4444";
                document.getElementById('battleActionBtn').textContent = "モンスターボールを投げる！ 🔴";
                battleState.step = 1;
            } else if (battleState.step === 1) {
                document.getElementById('battleActionBtn').style.display = "none";
                document.getElementById('ballIcon').className = "ball-shake active";
                log.textContent = `ボールが ゆれている......`;

                const coins = [100, 150, 200, 300, 500];
                const prize = coins[Math.floor(Math.random() * coins.length)];

                setTimeout(() => {
                    document.getElementById('ballIcon').className = "";
                    document.getElementById('ballIcon').textContent = "✨⭐✨";
                    log.innerHTML = `やったぜ！ 【${battleState.enemy.name}】を つかまえた！ 🎉\n💰 <strong>+${prize} ぽけえん</strong> ゲット！`;
                    
                    cloudData["study_balance"][currentUser].pokeen += prize;
                    
                    // 通常・メガ判定して図鑑保存
                    const zKey = battleState.enemy.isMega ? "study_zukan_mega" : "study_zukan_normal";
                    if(!cloudData[zKey][currentUser].includes(battleState.enemy.id)) {
                        cloudData[zKey][currentUser].push(battleState.enemy.id);
                        saveToCloud(zKey, JSON.stringify(cloudData[zKey]));
                    }

                    document.getElementById('battleCloseBtn').style.display = "block";
                    saveToCloud("study_balance", JSON.stringify(cloudData["study_balance"]));
                }, 1500);
            }
        }

        function closeBattleModal() {
            document.getElementById('battleModal').style.display = 'none';
            renderUI();
        }

        // 🛍️ 交換
        function buyItem(name, price) {
            const b = cloudData["study_balance"]?.[currentUser];
            if (!b || b.pokeen < price) { alert("ぽけえんが たりないよ！ 👛"); return; }
            if (confirm(`【${name}】と こうかんする？`)) {
                b.pokeen -= price;
                renderUI();
                saveToCloud("study_balance", JSON.stringify(cloudData["study_balance"]));
            }
        }

        // ロトム画面：地方別の図鑑レンダリングシステム
        function renderZukanGrid() {
            const grid = document.getElementById('zukanGridDisplay');
            grid.innerHTML = '';
            const mode = document.getElementById('regionSelector').value;

            const ownedNormal = cloudData["study_zukan_normal"]?.[currentUser] || [];
            const ownedMega = cloudData["study_zukan_mega"]?.[currentUser] || [];

            let totalCount = 0;
            let ownedCount = 0;

            if (mode === 'mega') {
                // メガシンカ特設枠
                const list = [{id:"0006_f2", name:"メガリザードンX"}, {id:"0006_f3", name:"メガリザードンY"}, {id:"0003_f2", name:"メガフシギバナ"}, {id:"0009_f2", name:"メガカメックス"}, {id:"0448_f2", name:"メガルカリオ"}];
                totalCount = list.length;
                list.forEach((p, i) => {
                    const hasIt = ownedMega.includes(p.id);
                    if(hasIt) ownedCount++;
                    createPkmBox(grid, p.id, hasIt ? p.name : "？？？？", i+1, hasIt);
                });
            } else {
                // 通常世代別自動生成ループ
                const range = regions[mode];
                totalCount = (range.end - range.start) + 1;
                
                for (let i = range.start; i <= range.end; i++) {
                    const idStr = String(i).padStart(4, '0');
                    const hasIt = ownedNormal.includes(idStr);
                    if(hasIt) ownedCount++;
                    
                    // 一定の人気御三家等以外は番号のみの仮処理表記
                    let pName = `No.${i}のポケモン`;
                    if (idStr === "0025") pName = "ピカチュウ";
                    if (idStr === "0001") pName = "フシギダネ";
                    if (idStr === "0004") pName = "ヒトカゲ";
                    if (idStr === "0006") pName = "リザードン";
                    if (idStr === "0007") pName = "ゼニガメ";
                    if (idStr === "0906") pName = "ニャオハ";
                    if (idStr === "0909") pName = "ホゲータ";
                    if (idStr === "0912") pName = "クワッス";

                    createPkmBox(grid, idStr, hasIt ? pName : "？？？？", i, hasIt);
                }
            }

            // メーター更新
            const percent = totalCount > 0 ? Math.floor((ownedCount / totalCount) * 100) : 0;
            document.getElementById('zukanProgressBar').style.width = `${percent}%`;
            document.getElementById('zukanProgressText').textContent = `${ownedCount} / ${totalCount} 匹 (${percent}%)`;
        }

        function createPkmBox(grid, id, name, displayNum, hasIt) {
            const box = document.createElement('div');
            box.className = hasIt ? 'grid-pokemon-box' : 'grid-pokemon-box unowned';
            box.innerHTML = `
                <div class="zukan-number-badge">#${String(displayNum).padStart(3, '0')}</div>
                <img src="${getImgUrl(id)}" alt="?">
                <span>${name}</span>
            `;
            grid.appendChild(box);
        }

        function openZukanSelectionModal() {
            const grid = document.getElementById('partnerSelectGrid'); grid.innerHTML = '';
            [{id:"0025",name:"ピカチュウ"},{id:"0001",name:"フシギダネ"},{id:"0004",name:"ヒトカゲ"},{id:"0007",name:"ゼニガメ"},{id:"0906",name:"ニャオハ"},{id:"0909",name:"ホゲータ"},{id:"0912",name:"クワッス"}].forEach(p => {
                const d = document.createElement('div'); d.style="padding:6px; cursor:pointer; background:#fff; color:#000; border-radius:8px; font-weight:bold; font-size:0.8rem;";
                d.innerHTML = `<img src="${getImgUrl(p.id)}" style="width:40px;height:40px;object-fit:contain;"><br>${p.name}`;
                d.addEventListener('click', () => {
                    cloudData["study_user_pokemon"][currentUser] = p.id; renderUI(); document.getElementById('partnerSelectModal').style.display='none';
                    saveToCloud("study_user_pokemon", JSON.stringify(cloudData["study_user_pokemon"]));
                });
                grid.appendChild(d);
            });
            document.getElementById('partnerSelectModal').style.display = 'flex';
        }
        function closePartnerSelectModal() { document.getElementById('partnerSelectModal').style.display = 'none'; }

        function adjustParentData(isPlus, type) {
            const amt = parseInt(document.getElementById('parentAmount').value) || 1;
            if (type === 'pokeen') cloudData["study_balance"][currentUser].pokeen += isPlus ? amt : -amt;
            if (type === 'ticket') cloudData["study_balance"][currentUser].gachaCount += 1;
            renderUI();
            saveToCloud("study_balance", JSON.stringify(cloudData["study_balance"]));
        }

        async function saveToCloud(k, v) {
            document.getElementById('syncBadge').textContent = "☁️ セーブ中...";
            try { await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'save', key: k, value: v }) }); document.getElementById('syncBadge').textContent = "同期完了"; }
            catch (e) { document.getElementById('syncBadge').textContent = "⚠️ ローカルセーブ"; }
        }

        async function initApp() {
            rollDailyEncounters();
            const timeout = new Promise(r => setTimeout(r, 2000, "timeout"));
            const fetchData = (async () => { try { const r = await fetch(GAS_URL); return await r.json(); } catch(e) { return null; } })();
            const res = await Promise.race([fetchData, timeout]);
            if (res && res !== "timeout") {
                Object.keys(res).forEach(k => { if (k.startsWith('study_')) { try { cloudData[k] = JSON.parse(res[k]); } catch(e) { cloudData[k] = res[k]; } } });
            }
            document.getElementById('loadingCover').style.display = 'none';
            changeUser('kouta');
        }
        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
